# For detailed configuration reference: https://supabase.com/docs/guides/local-development/cli/config
project_id = "form-studio"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "200MiB"

[storage.buckets.exercise-videos]
public = false
file_size_limit = "200MiB"
allowed_mime_types = ["video/mp4", "video/quicktime", "video/webm"]

[storage.buckets.exercise-thumbs]
public = true
file_size_limit = "5MiB"
allowed_mime_types = ["image/jpeg", "image/png", "image/webp"]

[storage.buckets.trainer-assets]
public = true
file_size_limit = "10MiB"
allowed_mime_types = ["image/jpeg", "image/png", "image/webp", "image/avif"]

[storage.buckets.client-progress]
public = false
file_size_limit = "15MiB"
allowed_mime_types = ["image/jpeg", "image/png", "image/webp"]

[auth]
enabled = true
# Clerk is the identity provider; Supabase Auth is disabled in practice.
# We still need this section to be valid TOML for `supabase start` to run.
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
enable_signup = false
enable_anonymous_sign_ins = false
jwt_expiry = 3600
